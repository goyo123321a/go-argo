name: Manual Build Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像名称'
        required: true
        default: 'proxy-app'
      image_tag:
        description: '镜像标签'
        required: false
        default: 'latest'
      architecture:
        description: '架构'
        required: true
        default: 'both'
        type: choice
        options:
          - both (amd64 + arm64)
          - amd64 only
          - arm64 only

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3
      if: github.event.inputs.architecture != 'amd64 only'
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set platforms
      id: platforms
      run: |
        case "${{ github.event.inputs.architecture }}" in
          "both (amd64 + arm64)")
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            ;;
          "amd64 only")
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            ;;
          "arm64 only")
            echo "platforms=linux/arm64" >> $GITHUB_OUTPUT
            ;;
        esac
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: ${{ steps.platforms.outputs.platforms }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}
          ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:${{ github.sha }}
    
    - name: Show result
      run: |
        echo "✅ 镜像构建成功！"
        echo "镜像地址: ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}"
        echo "拉取命令: docker pull ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}"

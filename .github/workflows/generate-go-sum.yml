name: Auto Update go.sum

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version'
        required: true
        default: '1.21'
        type: string
      clean_cache:
        description: 'Clean module cache'
        required: false
        default: 'true'
        type: boolean
      use_proxy:
        description: 'Use Go proxy'
        required: false
        default: 'true'
        type: boolean
      auto_commit:
        description: 'Auto commit changes'
        required: false
        default: 'true'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}
          cache: true
      
      - name: Configure Go environment
        run: |
          if [[ "${{ github.event.inputs.use_proxy }}" == "true" ]]; then
            go env -w GOPROXY=https://goproxy.io,direct
            echo "Using Go proxy: https://goproxy.io"
          else
            go env -w GOPROXY=direct
            echo "Using direct proxy"
          fi
          
          if [[ "${{ github.event.inputs.clean_cache }}" == "true" ]]; then
            go clean -modcache
            echo "Cleaned module cache"
          fi
      
      - name: Show Go environment
        run: |
          echo "Go version: $(go version)"
          echo "GOPROXY: $(go env GOPROXY)"
          echo "Current branch: $(git branch --show-current)"
      
      - name: Backup old go.sum
        id: backup
        run: |
          if [ -f go.sum ]; then
            cp go.sum go.sum.backup
            OLD_LINES=$(wc -l < go.sum)
            echo "old_lines=$OLD_LINES" >> $GITHUB_OUTPUT
            echo "Backed up old go.sum ($OLD_LINES lines)"
          else
            echo "old_lines=0" >> $GITHUB_OUTPUT
            echo "No existing go.sum found"
          fi
      
      - name: Update go.sum
        id: update
        run: |
          # 删除旧文件
          rm -f go.sum
          
          # 重新生成
          echo "Downloading dependencies..."
          go mod download 2>&1 | tee download.log
          
          echo "Tidying go.mod..."
          go mod tidy 2>&1 | tee tidy.log
          
          echo "Verifying dependencies..."
          go mod verify 2>&1 | tee verify.log
          
          # 检查是否生成
          if [ ! -f go.sum ]; then
            echo "❌ go.sum was not generated!"
            exit 1
          fi
          
          NEW_LINES=$(wc -l < go.sum)
          echo "new_lines=$NEW_LINES" >> $GITHUB_OUTPUT
          echo "✅ go.sum generated with $NEW_LINES lines"
      
      - name: Check for changes
        id: check
        run: |
          if [ -f go.sum.backup ]; then
            if diff -q go.sum.backup go.sum > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "✅ No changes in go.sum"
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "📝 go.sum has changed"
              echo "Changes:"
              diff -u go.sum.backup go.sum | head -50 || true
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 New go.sum created"
          fi
      
      - name: Test build
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "🧪 Testing build with new go.sum..."
          go build -o /tmp/test_build main.go
          if [ -f /tmp/test_build ]; then
            echo "✅ Build successful"
            rm /tmp/test_build
          else
            echo "❌ Build failed"
            exit 1
          fi
      
      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true' && github.event.inputs.auto_commit == 'true'
        run: |
          git add go.sum
          git status
          
          # 检查是否有未提交的更改
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto update go.sum (${{ steps.update.outputs.new_lines }} lines)
            
            - Old lines: ${{ steps.backup.outputs.old_lines }}
            - New lines: ${{ steps.update.outputs.new_lines }}
            - Go version: ${{ github.event.inputs.go_version }}
            
            Generated by GitHub Actions"
            
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Changes committed and pushed"
          fi
      
      - name: Generate summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## ✅ go.sum Auto Update Complete
          
          ### 📊 Statistics
          | Item | Value |
          |------|-------|
          | Old lines | ${{ steps.backup.outputs.old_lines }} |
          | New lines | ${{ steps.update.outputs.new_lines }} |
          | Changes | ${{ steps.check.outputs.changed }} |
          | Go version | ${{ github.event.inputs.go_version }} |
          
          ### 🔧 Environment
          - **Proxy:** ${{ github.event.inputs.use_proxy && 'Enabled' || 'Disabled' }}
          - **Cache Cleaned:** ${{ github.event.inputs.clean_cache && 'Yes' || 'No' }}
          - **Auto Commit:** ${{ github.event.inputs.auto_commit && 'Yes' || 'No' }}
          - **Build Test:** ✅ Passed
          
          ${{ steps.check.outputs.changed == 'true' && '### ✅ go.sum has been updated and committed' || '### ✅ go.sum is already up to date' }}
          
          EOF

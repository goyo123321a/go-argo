name: Generate and Fix go.sum

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version'
        required: true
        default: '1.21'
        type: string

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}
      
      - name: Fix go.sum
        run: |
          echo "🔧 Fixing go.sum..."
          
          # 清理并重新生成
          go clean -modcache
          rm -f go.sum
          go mod download
          go mod tidy
          go mod verify
          
          echo "✅ go.sum regenerated with $(wc -l < go.sum) lines"
      
      - name: Test build
        run: |
          go build -o myapp main.go
          if [ -f myapp ]; then
            echo "✅ Build successful"
            rm myapp
          else
            echo "❌ Build failed"
            exit 1
          fi
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate go.sum"
          file_pattern: "go.sum"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

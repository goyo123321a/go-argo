name: Generate go.sum

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version'
        required: true
        default: '1.21'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}
      
      - name: Clean old go.sum
        run: |
          rm -f go.sum
          echo "Removed old go.sum"
      
      - name: Generate new go.sum
        run: |
          go mod tidy
          go mod verify
          echo "Generated new go.sum"
      
      - name: Show go.sum content
        run: |
          echo "=== go.sum content ==="
          cat go.sum
      
      - name: Commit and push go.sum
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update go.sum"
          file_pattern: "go.sum"
          branch: ${{ github.ref_name }}

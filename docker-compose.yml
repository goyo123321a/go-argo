version: '3.8'

services:
  myapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - TARGETOS=linux
        - TARGETARCH=${TARGETARCH:-amd64}
    image: myapp:latest
    container_name: myapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 基础配置
      - UPLOAD_URL=${UPLOAD_URL}
      - PROJECT_URL=${PROJECT_URL}
      - AUTO_ACCESS=${AUTO_ACCESS:-false}
      - FILE_PATH=/app/tmp
      - SUB_PATH=${SUB_PATH:-sub}
      - SERVER_PORT=3000
      - UUID=${UUID:-9afd1229-b893-40c1-84dd-51e7ce204913}
      
      # 哪吒监控配置
      - NEZHA_SERVER=${NEZHA_SERVER}
      - NEZHA_PORT=${NEZHA_PORT}
      - NEZHA_KEY=${NEZHA_KEY}
      
      # Argo 隧道配置
      - ARGO_DOMAIN=${ARGO_DOMAIN}
      - ARGO_AUTH=${ARGO_AUTH}
      - ARGO_PORT=${ARGO_PORT:-8001}
      
      # 节点配置
      - CFIP=${CFIP:-saas.sin.fan}
      - CFPORT=${CFPORT:-443}
      - NAME=${NAME}
    volumes:
      # 持久化数据目录
      - ./data:/app/tmp
    networks:
      - myapp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  myapp-network:
    driver: bridge